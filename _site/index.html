<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo Queval | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --main-yellow: hsl(0, 0%, 15%); }
        body, html { margin: 0; padding: 0; font-family: 'Arial', sans-serif; overflow-x: hidden; }

        /* LE FOND JAUNE */
        .hero-section {
            background-color: var(--main-yellow);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* LA NAVBAR (Simplifiée) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            color: white;
        }
        .logo { font-size: 26px; font-weight: 900; text-transform: uppercase; color: white; text-decoration: none; }
        .menu a { color: white; text-decoration: none; margin-left: 30px; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .menu a:hover { opacity: 0.7; }
        
        /* LE CONTENU PRINCIPAL */
        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex: 1;
            padding: 0 80px;
        }

        .text-content { color: white; max-width: 500px; }
        .text-content h1 { font-size: 60px; margin: 0; line-height: 1; }
        .text-content h2 { font-size: 80px; margin: 10px 0; line-height: 0.9; }
        .highlight { background: white; color: var(--main-yellow); padding: 0 10px; }
        .text-content p { font-size: 18px; margin: 30px 0; opacity: 0.9; }

        /* LES BOUTONS */
        .btn-group { display: flex; gap: 20px; }
        .btn {
            padding: 15px 35px;
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: white; color: var(--main-yellow); }

        /* L'IMAGE */
        .image-content img {
            max-height: 90vh;
            display: block;
        }

        @media (max-width: 1024px) {
            .container { flex-direction: column; text-align: center; padding: 40px; }
            .image-content img { max-height: 50vh; }
            .text-content h2 { font-size: 50px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <nav>
            <div class="logo">Theo Queval</div>
            <div class="menu">
                <a href="/">Accueil</a>
                <a href="/a-propos/">À propos</a>
                <a href="/projets/">Projets</a>
                <a href="/cv/">CV</a>
            </div>
        </nav>

        <div class="container">
            <div class="text-content">
                <h2>Développeur & maker </h2>
                <p>Curieux et passionné, je conçois des projets tech innovants.</p>
                
                <div class="btn-group">
                    <a href="/projets/" class="btn">Projets</a>
                    <a href="/a-propos/" class="btn">À Propos</a>
                </div>
            </div>

            <div class="image-content">
                <img src="assets/images/Porsche.png" alt="Moi">
            </div>
        </div>
    </section>

</body>
</html>
